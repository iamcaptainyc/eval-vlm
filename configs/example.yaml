# eval_vlm 配置「可读参考」——展示每段含义与默认值。
#
# 实际使用走「工作目录模型」(见 README):
#   eval-vlm config set workspace <dir>                      # 机器级,一次性
#   eval-vlm split --dataset <源JSON> --train 0.95 --test 0.05  # 在 workspace 下建文件夹 + 生成同结构 config.yaml
#   eval-vlm eval  --dataset <数据集名>                       # 一键 run + score
# split 时该 config.yaml 由内置模板(src/eval_vlm/templates/config.template.yaml)自动生成,
# 之后微调直接手改 <workspace>/<名>/config.yaml。本文件仅供查阅各字段。

run_name: emotion_open11200_dataset_regen_v1            # 输出落到 <output_dir>/<run_name>/
output_dir: outputs

# ---------------------------------------------------------------------------
# 数据源:LlamaFactory 数据集格式 JSON(sharegpt 风格)
# ---------------------------------------------------------------------------
data:
  source: /root/autodl-tmp/capt/code/LlamaFactory/data/emotion_open11200_dataset_regen_v1.json   # LlamaFactory 格式 JSON 文件(完整数据集)
  media_root: /root/autodl-tmp/capt/code/LlamaFactory/                       # 相对图片路径相对此目录解析
  # 跨机器图片路径:训练时图片可能是训练机绝对路径(如 /root/autodl-tmp/.../images/x.jpg),
  # 评测机上不存在时,填该前缀剥掉,剩余部分再相对 media_root 定位。绝对路径若本机存在可留空。
  image_strip_prefix: null
  # 例:image_strip_prefix: /root/autodl-tmp/tyy_files/LlamaFactory/   media_root: /data/eval
  # 字段映射,对齐 LlamaFactory dataset_info.json。
  # 默认是 mllm_demo 风格(messages + role/content + user/assistant)。
  # 若你的数据是 conversations + from/value + human/gpt,改成下面注释的写法即可,无需改代码。
  mapping:
    messages: messages        # 对话列名(另一变体:conversations)
    images: images            # 图片列名
    tags:
      role: role              # 角色字段(另一变体:from)
      content: content        # 内容字段(另一变体:value)
      user: user              # 用户角色取值(另一变体:human)
      assistant: assistant    # 助手角色取值(另一变体:gpt)
  # conversations 变体示例:
  # mapping:
  #   messages: conversations
  #   images: images
  #   tags: {role: from, content: value, user: human, assistant: gpt}

# ---------------------------------------------------------------------------
# 数据划分(step 1: split)
# 把源 JSON 纯分割成 train / test(+可选 val),三份都是原样 LlamaFactory 格式:
#   train.json -> 直接拿去 LlamaFactory 训练
#   test.json  -> 本项目评测(run/score 按 LlamaFactory 格式读取)
#   val.json   -> 仅当 val > 0 时产出
# ---------------------------------------------------------------------------
split:
  train: 0.95                  # 训练集比例
  test: 0.05                   # 测试集比例
  val: 0.0                    # 验证集比例(>0 才产出 val.json);可选
  seed: 42                    # 固定随机种子 -> 可复现
  stratify_by: null           # 可填记录中的字段名做分层抽样(如标签字段),保证各类均衡
  # 自定义各份输出位置:消除"把 train.json 改名再复制到 LlamaFactory data/"的手工步骤。
  # 留空 -> 默认落到 outputs/<run_name>/{train,val,test}.json;父目录会自动创建。
  # 也可用命令行覆盖:--train-out / --val-out / --test-out。
  train_out: null             # 例:/root/autodl-tmp/LlamaFactory/data/emotion_open11200_train.json
  val_out: null
  test_out: null

# ---------------------------------------------------------------------------
# 推理后端(step 2: run)
# ---------------------------------------------------------------------------
inference:
  backend: openai             # openai(OpenAI 兼容 API) | fake(测试回显, 不联网)
  base_url: http://localhost:8000/v1   # vLLM / SGLang / LlamaFactory api 部署的服务地址(可用 --base-url 覆盖)
  model: trained-vlm          # 部署时注册的模型名(可用 --model 覆盖)
  api_key_env: OPENAI_API_KEY # 从该环境变量读取 api key(本地服务可随便填)
  system_prompt: null         # 可选系统提示
  max_concurrency: 8          # 并发请求数
  max_tokens: 512
  temperature: 0.0
  request_timeout: 120        # 单请求超时(秒)
  max_retries: 3              # 失败重试次数(指数退避)
  image_detail: auto          # OpenAI image_url 的 detail 字段: auto|low|high

# ---------------------------------------------------------------------------
# 多轮评测策略(step 2/3 共用)
# 数据常是两轮:轮1 让模型描述图片,轮2 让模型选情绪标签。
# ---------------------------------------------------------------------------
eval:
  targets: all                # all=每个 assistant 轮都评(轮1描述+轮2标签);last=仅最后一轮(只评标签)
  context: rollout            # rollout=用模型自己生成的前文作上下文(真·连续对话);gold=用数据集标准前文(教师强制)

# ---------------------------------------------------------------------------
# 评分(step 3: score)
# ---------------------------------------------------------------------------
scoring:
  scorer: exact_match         # 默认 scorer(已注册名称);可被 --scorer 覆盖
  turn_scorers: []            # 逐轮指定(按目标顺序),缺省回落到 scorer
  # 例:轮1描述用 token_f1(相似度),轮2标签用 exact_match(精确匹配):
  # turn_scorers: [token_f1, exact_match]
