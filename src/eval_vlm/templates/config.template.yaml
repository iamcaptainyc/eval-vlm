# eval_vlm 数据集配置(单一统一模板,所有命令共用)
# 由 `eval-vlm split --dataset <源json>`(有标注)或 `eval-vlm pred --datadir <图片夹>`(无标注)
# 首次运行时从本模板渲染到该数据集文件夹;之后微调直接手改这个 config.yaml 再重跑即可。
# (机器级路径来自全局配置 ~/.eval_vlm/config.yaml。)
#
# 产物按模型分目录:pred/score/eval 的结果落在 <数据集文件夹>/<模型名>/,
# 不同模型对同一数据集互不覆盖(openai/vllm/fake 取 inference.openai.model;
# mnn 取 inference.mnn.config_path 所在目录名);split 产物(train/test/val)
# 是各模型共享的,落在数据集文件夹本身。
#
# CLI 覆盖会「永久写回」本文件(用户参数优先且持久化,不是临时):
#   --base-url/--model(pred/eval -> inference.openai.*)、--scorer(score/eval)、
#   --backend、--mnn-config/--mnn-image-max-side(pred -> inference.mnn.*)、
#   --prompt/--system-prompt(pred --datadir -> pred.*)
#
# 一份配置覆盖全部命令,每段都标了「谁用」。与你当前命令无关的段保持默认即可,不会有副作用:
#   data.source / data.mapping / split / eval / scoring  -> split·pred(--dataset)·score·eval 使用
#   data.media_root / image_strip_prefix / inference     -> 所有命令共用
#   pred(下方段)                                        -> 仅 pred --datadir 使用

run_name: {{RUN_NAME}}                 # 仅作展示/元信息;实际产物落在本文件所在文件夹
output_dir: {{OUTPUT_DIR}}             # 工作目录(workspace);仅作元信息

# ---------------------------------------------------------------------------
# 数据(所有命令)
#   source / mapping  -> 仅 split·pred(--dataset)·score·eval(从 LlamaFactory 数据集 JSON 读样本);pred --datadir 留空
#   media_root        -> 所有命令:相对图片路径相对此目录解析(pred 运行时强制指向 --datadir)
# ---------------------------------------------------------------------------
data:
  source: {{SOURCE}}                   # 数据集 JSON(split 用;pred --dataset/score 读本文件夹的 test.json);pred --datadir 为空
  media_root: {{MEDIA_ROOT}}           # 图片相对路径解析根(机器级;pred = 图片文件夹)
  image_strip_prefix: {{IMAGE_STRIP_PREFIX}}   # 跨机训练绝对前缀,本机不需要则 null(机器级)
  # 字段映射(仅 split·pred --dataset·score),对齐 LlamaFactory dataset_info.json。
  # 默认 mllm_demo 风格(messages + role/content + user/assistant)。
  # 若数据是 conversations + from/value + human/gpt,改成下方注释写法即可,无需改代码。
  mapping:
    messages: messages        # 对话列名(另一变体:conversations)
    images: images            # 图片列名
    tags:
      role: role              # 角色字段(另一变体:from)
      content: content        # 内容字段(另一变体:value)
      user: user              # 用户角色取值(另一变体:human)
      assistant: assistant    # 助手角色取值(另一变体:gpt)
  # conversations 变体示例:
  # mapping:
  #   messages: conversations
  #   images: images
  #   tags: {role: from, content: value, user: human, assistant: gpt}

# ---------------------------------------------------------------------------
# 数据划分(仅 split;pred 忽略本段)
# 把源 JSON 纯分割成 train / test(+可选 val),三份都是原样 LlamaFactory 格式。
# train/test/val/seed/stratify_by 的值由 split 命令行参数填入,split 执行完后手改无效。
# ---------------------------------------------------------------------------
split:
  train: {{TRAIN}}            # 训练集比例(--train)
  test: {{TEST}}             # 测试集比例(--test)
  val: {{VAL}}              # 验证集比例(--val;>0 才产出 val.json)
  seed: {{SEED}}             # 固定随机种子(--seed)-> 可复现
  stratify_by: {{STRATIFY_BY}}     # 分层抽样字段(--stratify-by);null 表示不分层
  # 自定义各份输出位置(可直接写到 LlamaFactory data/);留空落到本文件夹。
  # 也可用命令行覆盖:--train-out / --val-out / --test-out。
  train_out: null
  val_out: null
  test_out: null

# ---------------------------------------------------------------------------
# 推理后端(所有命令:pred / eval 都用这段)
# 顶层只选 backend;每个后端的参数归到各自子块,互不冲突、不会「设了却不生效」。
# 切到哪个后端就只读哪个块。新增后端只需加一个子块。
#   backend=openai/vllm/fake -> 读 openai 块;产物子目录名取 openai.model
#   backend=mnn              -> 读 mnn 块;产物子目录名取 mnn.config_path 所在目录名
# CLI 覆盖永久写回:--base-url/--model -> openai.*;--mnn-config/--mnn-image-max-side -> mnn.*
# ---------------------------------------------------------------------------
inference:
  backend: openai             # openai/vllm(OpenAI 兼容 API,vllm 为别名) | mnn(本地 pymnn,串行) | cmnn(本地 C++ 原生库,批量并行) | fake(回显,自检用)
  # openai/vllm 后端(也是 fake 自检走的块):
  openai:
    base_url: http://localhost:8000/v1   # 部署地址(--base-url 永久写回)
    model: trained-vlm        # 部署时注册的模型名(--model 永久写回;也用作产物子目录名)
    api_key_env: OPENAI_API_KEY # 从该环境变量读取 api key(本地服务可随便填)
    system_prompt: null       # 系统提示(pred 也可在下方 pred.system_prompt 设置,后者运行时映射到这里)
    max_concurrency: 8        # 并发请求数
    max_tokens: 512           # 生成上限
    temperature: 0.0
    request_timeout: 120      # 单请求超时(秒)
    max_retries: 3            # 失败重试次数(指数退避)
    image_detail: auto        # OpenAI image_url 的 detail: auto|low|high
  # mnn 本地后端(只列 mnn 真正会用到的项):
  mnn:
    config_path: null         # 训练后转 mnn 的模型目录里 config.json 的路径,传给 MNN.llm.create();例: /root/autodl-tmp/qwen2-vl-mnn/config.json(--mnn-config 永久写回;也据其所在目录名定产物子目录)
    image_max_side: 2048      # 图片最长边像素上限(超大图等比缩放防 native OOM/segfault;设 0 关闭)(--mnn-image-max-side 永久写回)
    max_tokens: 512           # 生成上限(作为 response 的 max_new_tokens)
    # 采样 / 重复抑制(value-gated:每个旋钮按值开关,后端自动翻译成 MNN 采样管线,无需碰 sampler_type)。
    # 小模型(如 0.8B)纯贪心解码遇到「没把握」的图会陷入 \n\n\n… 复读到 max_tokens;
    # 默认「仅开重复惩罚 1.1 + 确定性选词」即可止住复读且结果可复现。规则:
    #   penalty(下面任一惩罚>0)→ 加重复惩罚步;top_k/top_p 设值 → 加对应截断步;
    #   temperature>0 → 随机采样(不可复现);temperature 留空/<=0 → argmax(确定、可复现)。
    repetition_penalty: 1.1   # >1 惩罚已出现 token(含换行);<=1 关闭。复读顽固可调 1.3~1.5
    frequency_penalty: 0.0    # >0 按出现次数累加惩罚(专治同一符号刷屏);0 关闭
    presence_penalty: 0.0     # >0 对出现过的 token 一次性惩罚;0 关闭
    penalty_window: 0         # 惩罚只回看最近 N 个 token;0=整段历史
    temperature: null         # null/<=0=确定性 argmax(可复现);>0=温度随机采样
    top_k: null               # 设值启用 top-k 截断;仅随机采样(temperature>0)有意义
    top_p: null               # 设值启用 nucleus 截断;仅随机采样(temperature>0)有意义
    # 想要标准的 topK+topP 生成式采样(自然多样),取消下面注释即可(结果每次不同):
    # temperature: 0.7
    # top_k: 40
    # top_p: 0.9
    # 高级逃生口:sampler_config 非空则原样下发 MNN 原生键(sampler_type/mixed_samplers…)、跳过上面翻译;
    #   设为 {} 则一概不下发、沿用模型 config.json 自带采样。
    sampler_config: null
  # cmnn 本地后端(C++ 原生库批量推理):功能同 mnn(多模态单图 + 同一套采样/缩放旋钮),
  # 区别是走 C++ 起 num_workers 个 Llm 实例 + 线程池并行整批,绕开 pymnn 的 GIL 串行瓶颈。
  # 下面除 num_workers/batch_size 外的项含义与 mnn 块完全一致(--cmnn-config 永久写回)。
  cmnn:
    config_path: null         # 转换产物目录里 config.json 的路径(--cmnn-config 永久写回;也据其所在目录名定产物子目录)
    num_workers: 4            # 原生库内并发的 Llm 实例数(=真并行度);受内存约束,每实例各持一份 KV cache(--cmnn-num-workers 永久写回)
    batch_size: 16            # 一次交给原生库的请求条数(分块喂,便于增量落盘/断点续跑;宜 >= num_workers)(--cmnn-batch-size 永久写回)
    image_max_side: 2048      # 图片最长边像素上限(超大图等比缩放防 native OOM/segfault;设 0 关闭)
    max_tokens: 512           # 生成上限(作为 response 的 max_new_tokens)
    # 采样 / 重复抑制:与 mnn 块同一套 value-gated 旋钮(含义见上方 mnn 注释)。
    repetition_penalty: 1.1
    frequency_penalty: 0.0
    presence_penalty: 0.0
    penalty_window: 0
    temperature: null
    top_k: null
    top_p: null
    sampler_config: null

# ---------------------------------------------------------------------------
# 多轮评测策略(仅 pred --dataset·score·eval;pred --datadir 忽略本段)
# 数据常是两轮:轮1 让模型描述图片,轮2 让模型选情绪标签。
# ---------------------------------------------------------------------------
eval:
  targets: all                # all=每个 assistant 轮都评;last=仅最后一轮
  context: rollout            # rollout=用模型自己生成的前文;gold=用数据集标准前文

# ---------------------------------------------------------------------------
# 评分(仅 score·eval;pred 忽略本段)
# ---------------------------------------------------------------------------
scoring:
  scorer: exact_match         # 默认 scorer(已注册名称);可被 --scorer 覆盖
  turn_scorers: []            # 逐轮指定(按目标顺序),缺省回落到 scorer
  # 例:轮1描述用 token_f1(相似度),轮2标签用 exact_match(精确匹配):
  # turn_scorers: [token_f1, exact_match]

# ---------------------------------------------------------------------------
# 无标注图片的对话怎么组织(仅 pred --datadir;其它命令忽略本段)
# 两种写法二选一:
#   1) 单轮简写:只设 prompt(+可选 system_prompt)。每张图发一轮 user 消息;
#      若 prompt 不含 <image>,会自动在最前面加一个。(可用 --prompt 临时覆盖)
#   2) 多轮模板:取消注释 template(role/content 列表),它会覆盖 prompt。
#      可加纯文本的 assistant/user 轮做 few-shot 引导。
# 规则:全部轮里 <image> 必须恰好出现 1 次且位于某个 user 轮;最后一轮必须是 user。
# ---------------------------------------------------------------------------
pred:
  prompt: 请描述图片          # 单轮默认提示词(--prompt 永久写回本字段)
  system_prompt: null         # 可选系统提示(--system-prompt 永久写回本字段)
  # template:                 # 多轮模板(取消注释并编辑;设置后覆盖 prompt)
  #   - {role: user, content: "我会给你一张图片,请用简体中文、200 字以内、客观描述画面内容。"}
  #   - {role: assistant, content: "好的,请提供图片。"}
  #   - {role: user, content: "<image>请描述这张图片"}
